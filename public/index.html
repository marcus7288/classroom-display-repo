<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>Classroom Display</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232f6fed'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='white'%3E%F0%9F%93%BA%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">

    <!-- Room picker: shown only when the URL has no ?room= param -->
    <section id="room-picker" hidden aria-label="Choose a room">
      <h1>Classroom Display</h1>
      <p>Choose a room to open its display.</p>
      <div id="room-picker-list" class="room-list"></div>
    </section>

    <!-- Start splash: one press unlocks audio + screen wake lock for the session -->
    <section id="start-splash" hidden aria-label="Start display">
      <h1 id="start-splash-title">Classroom Display</h1>
      <button id="start-btn" class="big-btn" autofocus>Press Enter to Start</button>
      <p class="hint">This unlocks sound for the room's music and cues.</p>
    </section>

    <!-- Main stage: hidden until start is pressed -->
    <main id="stage" hidden>
      <div id="scene-root" aria-live="polite"></div>

      <div id="hud">
        <div id="clock"></div>
        <div id="next-up"></div>
        <div id="data-indicator" hidden title="Using saved/placeholder content">&#9888; offline copy</div>
      </div>

      <nav id="control-bar" aria-label="Scene controls">
        <div class="control-row" id="scene-buttons"></div>
        <button id="resume-btn" class="control-btn resume">&#8635; Resume Schedule</button>
      </nav>
    </main>

  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
